<!DOCTYPE html>
<html lang="en">
<head>
	<title>PC Grafika ThreeJS</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
		/* Style for slider positioning */
		#gravitySlider {
			position: absolute;
			bottom: 10px;
			left: 50%;
			transform: translateX(-50%);
			width: 300px;
		}
		label {
			position: absolute;
			bottom: 40px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 14px;
			color: white; /* Ensure visibility on dark background */
			z-index: 2; /* Above canvas */
		}
		#gravitySlider {
			pointer-events: auto; /* Ensure the slider receives its own events */
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 2; /* Slider on top of the canvas */
		}

		canvas {
			pointer-events: all; /* Ensure the canvas continues to receive events */
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
		}

		#scoreDisplay {
			position: absolute;
			top: 10px; /* Adjust as needed to move it slightly down from the top */
			left: 50%;
			transform: translateX(-50%);
			font-size: 18px; /* Adjust font size as needed */
			color: white; /* Ensure visibility against the background */
			z-index: 3; /* Ensure it appears above other elements */
			background-color: rgba(0, 0, 0, 0.5); /* Optional: Add a background for better visibility */
			padding: 5px 10px; /* Optional: Add some padding around the text */
			border-radius: 5px; /* Optional: Add rounded corners */
		}

		#modeControls {
			position: absolute;
			bottom: 50px;
			left: 15%;
			transform: translateX(-50%);
			z-index: 3; /* Ensure buttons are above canvas */
		}

		#modeControls button {
			margin: 5px;
			padding: 10px 20px;
			font-size: 14px;
			cursor: pointer;
		}

		.active {
			background-color: #4CAF50; /* Highlight active button */
			color: white;
		}

	</style>
</head>

<script src="js/threejs/build/three.js"></script>
<script src="js/threejs/js/controls/OrbitControls.js"></script>

<body>
<div id="canvas1">
	<label for="gravitySlider">GRAVITY</label>
	<input
			type="range"
			id="gravitySlider"
			min="0.009"
			max="0.02"
			step="0.001"
			value="0.02"
	/>

	<div id="scoreDisplay">Score: 0</div>

	<div id="modeControls">
		<button id="modeAddBumper">Add Bumper</button>
		<button id="modeAddBooster">Add Booster</button>
	</div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
